<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGenie - AI Educational Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <header>
        <h1>EduGenie</h1>
        <p>AI-Powered Educational Assistant</p>
    </header>

    <main>

        <!-- Feature Selection -->
        <div id="feature-select">
            <h2>Choose a Feature</h2>
            <div class="buttons">
                <button onclick="selectFeature('qa')">Ask a Question</button>
                <button onclick="selectFeature('explain')">Explain a Concept</button>
                <button onclick="selectFeature('quiz')">Generate Quiz</button>
                <button onclick="selectFeature('summarize')">Summarize Text</button>
                <button onclick="selectFeature('learn')">Learning Path</button>
            </div>
        </div>

        <!-- Input Area -->
        <div id="input-area" style="display:none;">
            <h2 id="input-title"></h2>
            <textarea id="user-input" rows="5" placeholder="Type here..."></textarea>

            <!-- Extra options for quiz -->
            <div id="quiz-options" style="display:none;">
                <label>Number of questions:
                    <select id="num-questions">
                        <option value="3">3</option>
                        <option value="5" selected>5</option>
                        <option value="10">10</option>
                    </select>
                </label>
            </div>

            <!-- Extra options for learning path -->
            <div id="level-options" style="display:none;">
                <label>Your level:
                    <select id="user-level">
                        <option value="beginner">Beginner</option>
                        <option value="intermediate">Intermediate</option>
                        <option value="advanced">Advanced</option>
                    </select>
                </label>
            </div>

            <div class="action-buttons">
                <button onclick="submitRequest()">Submit</button>
                <button onclick="goBack()">Back</button>
            </div>
        </div>

        <!-- Loading -->
        <div id="loading" style="display:none;">
            <p>Processing your request...</p>
        </div>

        <!-- Result Area -->
        <div id="result-area" style="display:none;">
            <h2>Response</h2>
            <div id="result-content"></div>
            <div class="action-buttons">
                <button onclick="goBack()">Try Another</button>
            </div>
        </div>

    </main>

    <footer>
        <p>EduGenie &copy; 2026</p>
    </footer>

    <script>
        let currentFeature = '';

        const config = {
            'qa':        { title: 'Ask a Question', placeholder: 'e.g., Which is the largest ocean?' },
            'explain':   { title: 'Explain a Concept', placeholder: 'e.g., Pythagoras Theorem' },
            'quiz':      { title: 'Generate Quiz', placeholder: 'e.g., Photosynthesis' },
            'summarize': { title: 'Summarize Text', placeholder: 'Paste the text you want to summarize...' },
            'learn':     { title: 'Learning Path', placeholder: 'e.g., SQL, Machine Learning, Python' }
        };

        function selectFeature(feature) {
            currentFeature = feature;
            document.getElementById('feature-select').style.display = 'none';
            document.getElementById('result-area').style.display = 'none';
            document.getElementById('input-area').style.display = 'block';
            document.getElementById('input-title').textContent = config[feature].title;
            document.getElementById('user-input').placeholder = config[feature].placeholder;
            document.getElementById('user-input').value = '';

            // Show/hide extra options
            document.getElementById('quiz-options').style.display = feature === 'quiz' ? 'block' : 'none';
            document.getElementById('level-options').style.display = feature === 'learn' ? 'block' : 'none';
        }

        function goBack() {
            document.getElementById('input-area').style.display = 'none';
            document.getElementById('result-area').style.display = 'none';
            document.getElementById('loading').style.display = 'none';
            document.getElementById('feature-select').style.display = 'block';
        }

        async function submitRequest() {
            const input = document.getElementById('user-input').value.trim();
            if (!input) {
                alert('Please enter something.');
                return;
            }

            let url = '';
            let body = {};

            switch (currentFeature) {
                case 'qa':
                    url = '/qa';
                    body = { question: input };
                    break;
                case 'explain':
                    url = '/explain';
                    body = { topic: input };
                    break;
                case 'quiz':
                    url = '/quiz';
                    const numQ = parseInt(document.getElementById('num-questions').value);
                    body = { topic: input, num_questions: numQ };
                    break;
                case 'summarize':
                    url = '/summarize';
                    body = { text: input };
                    break;
                case 'learn':
                    url = '/learn/recommendations';
                    const level = document.getElementById('user-level').value;
                    body = { topic: input, level: level };
                    break;
            }

            // Show loading, hide input
            document.getElementById('input-area').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await response.json();

                document.getElementById('result-content').innerHTML = markdownToHtml(data.response);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('result-area').style.display = 'block';
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('input-area').style.display = 'block';
                alert('Error: ' + error.message);
            }
        }

        // Simple markdown to HTML converter
        function markdownToHtml(text) {
            if (!text) return '';
            let html = text;

            // Escape HTML special chars first
            html = html.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

            // Horizontal rules
            html = html.replace(/^---+$/gm, '<hr>');

            // Headers (### before ## before #)
            html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

            // Bold and italic
            html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

            // Unordered lists (lines starting with * or -)
            html = html.replace(/^\* (.+)$/gm, '<li>$1</li>');
            html = html.replace(/^- (.+)$/gm, '<li>$1</li>');

            // Numbered lists
            html = html.replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>');

            // Wrap consecutive <li> in <ul>
            html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');

            // Line breaks (double newline = paragraph, single = <br>)
            html = html.replace(/\n\n/g, '</p><p>');
            html = html.replace(/\n/g, '<br>');
            html = '<p>' + html + '</p>';

            // Clean up empty paragraphs
            html = html.replace(/<p>\s*<\/p>/g, '');

            return html;
        }
    </script>

</body>
</html>
